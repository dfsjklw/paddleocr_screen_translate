# Screen Translate 配置文件
# 所有路径均相对于本文件所在目录

capture:
  # 采集后端: directshow (OBS虚拟摄像头/普通摄像头)
  backend: "directshow"
  # 摄像头设备索引 (DirectShow模式)
  camera_index: 0
  # 采集帧率
  fps: 30

ocr:
  # OCR引擎 (NCNN PaddleOCRv5)
  engine: "ncnn"
  # screen_transalate_ocr.exe 路径
  exe_path: "./ncnn_ocr/screen_transalate_ocr.exe"
  # Python 侧二次过滤最小置信度 (低于此值的结果丢弃)
  min_confidence: 0.5
  # subprocess 超时时间 (秒)
  timeout: 30
  # ── 检测参数 ──
  # 检测框轮廓分数阈值 (0.0~1.0，默认 0.6，降低=更宽松)
  det_box_thresh: 0.6
  # 概率图二值化阈值 (0.0~1.0，默认 0.3，降低=更宽松)
  det_binary_thresh: 0.3
  # ── 识别过滤参数 ──
  # 单字符置信度阈值 (0.0~1.0，0.0=关闭过滤)
  rec_char_thresh: 0.0
  # 文本块平均置信度阈值 (0.0~1.0，0.0=关闭过滤)
  rec_block_thresh: 0.0
  # ── 字典 ──
  # 字典文件名 (zh_dict.txt=中文, en_dict.txt=英文)
  dict_name: "zh_dict.txt"

translator:
  # 翻译后端: llama (本地大模型)
  backend: "llama"
  llama:
    # llama.cpp server 地址
    url: "http://127.0.0.1:8080"
    # 请求超时 (秒)
    timeout: 30
    # 最大重试次数
    max_retries: 2
    # 并行翻译请求数
    parallel_requests: 4
    # 推理参数
    inference_params:
      temperature: 0.7
      top_k: 20
      top_p: 0.6
      repeat_penalty: 1.05
      n_predict: 512

# 源语言和目标语言
source_lang: "en"
target_lang: "zh"

overlay:
  # 覆盖层后端: wxpython (跨平台透明窗口)
  # 字体大小
  font_size: 16
  # 字体族
  font_family: "Microsoft YaHei"
  # 背景不透明度 (0.0~1.0)，越高越能遮盖原文
  background_opacity: 0.5
  # 文本颜色 (十六进制)
  text_color: "#FFFFFF"
  # 是否启用 WDA_EXCLUDEFROMCAPTURE 防污染
  exclude_from_capture: false

pipeline:
  # 目标周期 (秒)
  cycle_interval: 8.0
  # OCR前图像长边最大像素 (超过此值等比缩小, 0=不限制)
  downscale_max_size: 720

gui:
  # UI 语言: "en" (English) 或 "zh" (中文)
  ui_language: "en"
  # 暂停/继续快捷键
  hotkey_pause: "F9"
  # 退出快捷键
  hotkey_quit: "F10"
  # 单次翻译快捷键
  hotkey_single_translate: "F8"
  # 划屏翻译快捷键
  hotkey_region_translate: "F7"
  # 清除覆盖层快捷键
  hotkey_clear_overlay: "F6"

logging:
  # 是否启用日志
  enabled: true
  # 日志文件路径 (JSONL格式)
  path: "./logs/cycles.jsonl"
  # 是否记录耗时
  include_timing: true
