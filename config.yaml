# Screen Translate 配置文件
# 所有路径均相对于本文件所在目录

ocr:
  # OCR引擎: "paddle" 或 "easyocr"
  engine: "paddle"
  # PP-OCRv5 检测模型目录
  det_model_dir: "./PP-OCRv5_mobile_det_infer"
  # PP-OCRv5 识别模型目录
  rec_model_dir: "./PP-OCRv5_mobile_rec_infer"
  # CPU推理线程数
  cpu_threads: 6
  # 检测置信度阈值 (PP-OCRv5 官方默认: 0.3)
  det_threshold: 0.3
  # 框置信度阈值 (PP-OCRv5 官方默认: 0.6)
  box_threshold: 0.6
  # 最小综合置信度 (低于此值的结果丢弃)
  min_confidence: 0.5
  # det resize_long 参数
  det_resize_long: 640

translator:
  # 翻译后端: llama (本地大模型)
  backend: "llama"
  llama:
    # llama.cpp server 地址
    url: "http://127.0.0.1:8080"
    # 请求超时 (秒)
    timeout: 30
    # 最大重试次数
    max_retries: 2
    # 并行翻译请求数
    parallel_requests: 4
    # 推理参数
    inference_params:
      temperature: 0.7
      top_k: 20
      top_p: 0.6
      repeat_penalty: 1.05
      n_predict: 512

# 源语言和目标语言
source_lang: "en"
target_lang: "zh"

overlay:
  # 字体大小
  font_size: 16
  # 字体族
  font_family: "Microsoft YaHei"
  # 背景不透明度 (0.0~1.0)，越高越能遮盖原文
  background_opacity: 0.5
  # 文本颜色 (十六进制)
  text_color: "#FFFFFF"

pipeline:
  # 目标周期 (秒)
  cycle_interval: 8.0
  # 单帧最大文本框数
  max_text_boxes: 350

gui:
  # UI 语言: "en" (English) 或 "zh" (中文)
  ui_language: "en"
  # 退出快捷键
  hotkey_quit: "F10"
  # 划屏翻译快捷键
  hotkey_region_translate: "F7"
  # 清除覆盖层快捷键
  hotkey_clear_overlay: "F6"

logging:
  # 是否启用日志
  enabled: true
  # 日志文件路径 (JSONL格式)
  path: "./logs/cycles.jsonl"
  # 是否记录耗时
  include_timing: true
